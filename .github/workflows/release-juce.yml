name: Release JUCE Plugin

on:
  push:
    tags:
      - 'octobir-v*'
      - 'octobass-v*'
  workflow_dispatch:
    inputs:
      plugin:
        description: 'Plugin to release'
        required: true
        type: choice
        options:
          - octobir
          - octobass
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  resolve-plugin:
    name: Resolve Plugin
    runs-on: ubuntu-latest
    outputs:
      plugin: ${{ steps.resolve.outputs.plugin }}
      version: ${{ steps.resolve.outputs.version }}
      cmake_target: ${{ steps.resolve.outputs.cmake_target }}
      product_name: ${{ steps.resolve.outputs.product_name }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Resolve plugin and version from tag or input
      id: resolve
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          PLUGIN="${{ inputs.plugin }}"
          VERSION="${{ inputs.version }}"
        else
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" == octobir-v* ]]; then
            PLUGIN="octobir"
            VERSION="${TAG#octobir-v}"
          elif [[ "$TAG" == octobass-v* ]]; then
            PLUGIN="octobass"
            VERSION="${TAG#octobass-v}"
          else
            echo "Error: Unknown tag format: $TAG"
            exit 1
          fi
        fi

        if [ "$PLUGIN" = "octobir" ]; then
          CMAKE_TARGET="OctobIR_All"
          PRODUCT_NAME="OctobIR"
        elif [ "$PLUGIN" = "octobass" ]; then
          CMAKE_TARGET="OctoBASS_All"
          PRODUCT_NAME="OctoBASS"
        fi

        echo "plugin=$PLUGIN" >> $GITHUB_OUTPUT
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "cmake_target=$CMAKE_TARGET" >> $GITHUB_OUTPUT
        echo "product_name=$PRODUCT_NAME" >> $GITHUB_OUTPUT

  build-macos:
    name: Build JUCE Plugin - macOS
    runs-on: macos-latest
    needs: [resolve-plugin]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        brew install cmake ninja

    - name: Build plugin
      run: |
        PLUGIN="${{ needs.resolve-plugin.outputs.plugin }}"
        TARGET="${{ needs.resolve-plugin.outputs.cmake_target }}"
        UPPER_PLUGIN=$(echo "$PLUGIN" | tr '[:lower:]' '[:upper:]')
        cmake --preset release \
          -DBUILD_${UPPER_PLUGIN}_JUCE=ON \
          -DBUILD_${UPPER_PLUGIN}_VCV=OFF \
          -G Ninja
        cmake --build build/release --target "$TARGET" --config Release -j

    - name: Build installer
      env:
        SIGNING_IDENTITY: "-"
      run: |
        PLUGIN="${{ needs.resolve-plugin.outputs.plugin }}"
        if [ -f "installers/$PLUGIN/macos/build-pkg.sh" ]; then
          chmod +x "installers/$PLUGIN/macos/build-pkg.sh"
          "./installers/$PLUGIN/macos/build-pkg.sh"
        else
          echo "No macOS installer script for $PLUGIN"
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: juce-plugin-macos-installer
        path: dist/${{ needs.resolve-plugin.outputs.product_name }}-*-macOS.dmg

  build-windows:
    name: Build JUCE Plugin - Windows
    runs-on: windows-latest
    needs: [resolve-plugin]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install CMake
      uses: lukka/get-cmake@latest

    - name: Build plugin
      shell: bash
      run: |
        PLUGIN="${{ needs.resolve-plugin.outputs.plugin }}"
        TARGET="${{ needs.resolve-plugin.outputs.cmake_target }}"
        UPPER_PLUGIN=$(echo "$PLUGIN" | tr '[:lower:]' '[:upper:]')
        cmake --preset release \
          -DBUILD_${UPPER_PLUGIN}_JUCE=ON \
          -DBUILD_${UPPER_PLUGIN}_VCV=OFF \
          -G "Visual Studio 17 2022" -A x64
        cmake --build build/release --config Release -j

    - name: Install Inno Setup
      run: choco install innosetup -y

    - name: Create dist directory
      shell: bash
      run: mkdir -p dist

    - name: Build installer
      shell: bash
      run: |
        PLUGIN="${{ needs.resolve-plugin.outputs.plugin }}"
        PRODUCT="${{ needs.resolve-plugin.outputs.product_name }}"
        if [ -f "installers/$PLUGIN/windows/$PRODUCT.iss" ]; then
          iscc "installers/$PLUGIN/windows/$PRODUCT.iss"
        else
          echo "No Windows installer script for $PLUGIN"
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: juce-plugin-windows-installer
        path: dist/${{ needs.resolve-plugin.outputs.product_name }}-*-Windows.exe

  build-linux:
    name: Build JUCE Plugin - Linux
    runs-on: ubuntu-latest
    needs: [resolve-plugin]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          libasound2-dev \
          libjack-jackd2-dev \
          libcurl4-openssl-dev \
          libfreetype6-dev \
          libx11-dev \
          libxcomposite-dev \
          libxcursor-dev \
          libxext-dev \
          libxinerama-dev \
          libxrandr-dev \
          libxrender-dev \
          libwebkit2gtk-4.1-dev \
          libglu1-mesa-dev \
          mesa-common-dev

    - name: Build plugin
      run: |
        PLUGIN="${{ needs.resolve-plugin.outputs.plugin }}"
        TARGET="${{ needs.resolve-plugin.outputs.cmake_target }}"
        UPPER_PLUGIN=$(echo "$PLUGIN" | tr '[:lower:]' '[:upper:]')
        cmake --preset release \
          -DBUILD_${UPPER_PLUGIN}_JUCE=ON \
          -DBUILD_${UPPER_PLUGIN}_VCV=OFF \
          -G Ninja
        cmake --build build/release --target "$TARGET" --config Release -j

    - name: Create package directory
      run: |
        PLUGIN="${{ needs.resolve-plugin.outputs.plugin }}"
        PRODUCT="${{ needs.resolve-plugin.outputs.product_name }}"

        mkdir -p "package/$PRODUCT"

        if [ -d "build/release/plugins/$PLUGIN/juce/${PRODUCT}_artefacts/Release/VST3/$PRODUCT.vst3" ]; then
          cp -r "build/release/plugins/$PLUGIN/juce/${PRODUCT}_artefacts/Release/VST3/$PRODUCT.vst3" "package/$PRODUCT/"
        fi

        cp LICENSE "package/$PRODUCT/"
        cp README.md "package/$PRODUCT/"

        if [ -f "installers/$PLUGIN/linux/install.sh" ]; then
          cp "installers/$PLUGIN/linux/install.sh" "package/$PRODUCT/"
          chmod +x "package/$PRODUCT/install.sh"
        fi

    - name: Create tarball
      run: |
        PRODUCT="${{ needs.resolve-plugin.outputs.product_name }}"
        cd package
        tar -czf "../${PRODUCT}-Linux.tar.gz" "$PRODUCT"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: juce-plugin-linux
        path: ${{ needs.resolve-plugin.outputs.product_name }}-Linux.tar.gz

  release:
    name: Create GitHub Release
    needs: [resolve-plugin, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Display structure of downloaded files
      run: ls -R artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/juce-plugin-macos-installer/*.dmg
          artifacts/juce-plugin-windows-installer/*.exe
          artifacts/juce-plugin-linux/*.tar.gz
        draft: true
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
