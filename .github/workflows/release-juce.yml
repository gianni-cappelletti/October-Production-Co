name: Release JUCE Plugins

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 2.0.0 or 2.0.0-beta.1)'
        required: true
        default: '2.0.0'

jobs:
  resolve-version:
    name: Resolve Release Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            FILE_VERSION="$(cat VERSION | tr -d '[:space:]')"
            if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
              echo "::warning::Tag version ($TAG_VERSION) differs from VERSION file ($FILE_VERSION). Using tag."
            fi
            VERSION="$TAG_VERSION"
          else
            VERSION="$(cat VERSION | tr -d '[:space:]')"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if echo "$VERSION" | grep -qE '-(alpha|beta|rc)'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Resolved version: $VERSION"

  build-macos:
    name: Build JUCE Plugins - macOS (universal)
    runs-on: macos-14
    needs: [resolve-version]
    strategy:
      matrix:
        plugin:
          - name: octobir
            cmake_target: OctobIR_All
            product_name: OctobIR
          - name: octobass
            cmake_target: OctoBASS_All
            product_name: OctoBASS
    env:
      BUILD_DIR: build/release-macos-universal
      RELEASE_VERSION: ${{ needs.resolve-version.outputs.version }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        brew install cmake ninja

    - name: Build plugin (universal arm64 + x86_64)
      run: |
        PLUGIN="${{ matrix.plugin.name }}"
        TARGET="${{ matrix.plugin.cmake_target }}"
        UPPER_PLUGIN=$(echo "$PLUGIN" | tr '[:lower:]' '[:upper:]')
        cmake --preset release-macos-universal \
          -DBUILD_${UPPER_PLUGIN}_JUCE=ON \
          -DBUILD_${UPPER_PLUGIN}_VCV=OFF \
          -G Ninja
        cmake --build "$BUILD_DIR" --target "$TARGET" --config Release -j

    - name: Verify universal binary
      run: |
        PLUGIN="${{ matrix.plugin.name }}"
        PRODUCT="${{ matrix.plugin.product_name }}"
        ARTEFACTS="$BUILD_DIR/plugins/$PLUGIN/juce/${PRODUCT}_artefacts/Release"

        echo "Checking VST3..."
        lipo -info "$ARTEFACTS/VST3/$PRODUCT.vst3/Contents/MacOS/$PRODUCT"
        file "$ARTEFACTS/VST3/$PRODUCT.vst3/Contents/MacOS/$PRODUCT" | grep -q "universal" \
          || (echo "ERROR: VST3 is not a universal binary" && exit 1)

        echo "Checking AU..."
        lipo -info "$ARTEFACTS/AU/$PRODUCT.component/Contents/MacOS/$PRODUCT"
        file "$ARTEFACTS/AU/$PRODUCT.component/Contents/MacOS/$PRODUCT" | grep -q "universal" \
          || (echo "ERROR: AU is not a universal binary" && exit 1)

        echo "Universal binary verification passed"

    - name: Build installer
      env:
        SIGNING_IDENTITY: "-"
      run: |
        PLUGIN="${{ matrix.plugin.name }}"
        if [ -f "installers/$PLUGIN/macos/build-pkg.sh" ]; then
          chmod +x "installers/$PLUGIN/macos/build-pkg.sh"
          "./installers/$PLUGIN/macos/build-pkg.sh"
        else
          echo "No macOS installer script for $PLUGIN"
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.plugin.product_name }}-macos-installer
        path: dist/${{ matrix.plugin.product_name }}-*-macOS.dmg

  build-windows:
    name: Build JUCE Plugins - Windows
    runs-on: windows-latest
    needs: [resolve-version]
    env:
      RELEASE_VERSION: ${{ needs.resolve-version.outputs.version }}
    strategy:
      matrix:
        plugin:
          - name: octobir
            cmake_target: OctobIR_All
            product_name: OctobIR
          - name: octobass
            cmake_target: OctoBASS_All
            product_name: OctoBASS

    steps:
    # Windows strips trailing dots from directory names. The runner creates the
    # workspace at a dot-stripped path but GITHUB_WORKSPACE retains the dots,
    # causing actions/checkout to fail. Fix the env var to match the real path.
    - name: Fix workspace path
      shell: powershell
      run: |
        $fixed = $env:GITHUB_WORKSPACE -replace '\.(?=\\|$)', ''
        echo "GITHUB_WORKSPACE=$fixed" >> $env:GITHUB_ENV

    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install CMake
      uses: lukka/get-cmake@latest

    - name: Build plugin
      shell: bash
      run: |
        PLUGIN="${{ matrix.plugin.name }}"
        TARGET="${{ matrix.plugin.cmake_target }}"
        UPPER_PLUGIN=$(echo "$PLUGIN" | tr '[:lower:]' '[:upper:]')
        cmake --preset release \
          -DBUILD_${UPPER_PLUGIN}_JUCE=ON \
          -DBUILD_${UPPER_PLUGIN}_VCV=OFF \
          -G "Visual Studio 17 2022" -A x64
        cmake --build build/release --config Release -j

    - name: Install Inno Setup
      run: choco install innosetup -y

    - name: Create dist directory
      shell: bash
      run: mkdir -p dist

    - name: Build installer
      shell: bash
      run: |
        PLUGIN="${{ matrix.plugin.name }}"
        PRODUCT="${{ matrix.plugin.product_name }}"
        if [ -f "installers/$PLUGIN/windows/$PRODUCT.iss" ]; then
          iscc "/DAppVersion=$RELEASE_VERSION" "installers/$PLUGIN/windows/$PRODUCT.iss"
        else
          echo "No Windows installer script for $PLUGIN"
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.plugin.product_name }}-windows-installer
        path: dist/${{ matrix.plugin.product_name }}-*-Windows.exe

  build-linux:
    name: Build JUCE Plugins - Linux
    runs-on: ubuntu-latest
    needs: [resolve-version]
    env:
      RELEASE_VERSION: ${{ needs.resolve-version.outputs.version }}
    strategy:
      matrix:
        plugin:
          - name: octobir
            cmake_target: OctobIR_All
            product_name: OctobIR
          - name: octobass
            cmake_target: OctoBASS_All
            product_name: OctoBASS

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          libasound2-dev \
          libjack-jackd2-dev \
          libcurl4-openssl-dev \
          libfreetype6-dev \
          libx11-dev \
          libxcomposite-dev \
          libxcursor-dev \
          libxext-dev \
          libxinerama-dev \
          libxrandr-dev \
          libxrender-dev \
          libwebkit2gtk-4.1-dev \
          libglu1-mesa-dev \
          mesa-common-dev

    - name: Build plugin
      run: |
        PLUGIN="${{ matrix.plugin.name }}"
        TARGET="${{ matrix.plugin.cmake_target }}"
        UPPER_PLUGIN=$(echo "$PLUGIN" | tr '[:lower:]' '[:upper:]')
        cmake --preset release \
          -DBUILD_${UPPER_PLUGIN}_JUCE=ON \
          -DBUILD_${UPPER_PLUGIN}_VCV=OFF \
          -G Ninja
        cmake --build build/release --target "$TARGET" --config Release -j

    - name: Create package directory
      run: |
        PLUGIN="${{ matrix.plugin.name }}"
        PRODUCT="${{ matrix.plugin.product_name }}"

        mkdir -p "package/$PRODUCT"

        if [ -d "build/release/plugins/$PLUGIN/juce/${PRODUCT}_artefacts/Release/VST3/$PRODUCT.vst3" ]; then
          cp -r "build/release/plugins/$PLUGIN/juce/${PRODUCT}_artefacts/Release/VST3/$PRODUCT.vst3" "package/$PRODUCT/"
        fi

        cp LICENSE "package/$PRODUCT/"
        cp README.md "package/$PRODUCT/"

        if [ -f "installers/$PLUGIN/linux/install.sh" ]; then
          cp "installers/$PLUGIN/linux/install.sh" "package/$PRODUCT/"
          chmod +x "package/$PRODUCT/install.sh"
        fi

    - name: Create tarball
      run: |
        PRODUCT="${{ matrix.plugin.product_name }}"
        cd package
        tar -czf "../${PRODUCT}-${RELEASE_VERSION}-Linux.tar.gz" "$PRODUCT"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.plugin.product_name }}-linux
        path: ${{ matrix.plugin.product_name }}-*-Linux.tar.gz

  release:
    name: Create GitHub Release
    needs: [resolve-version, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Display structure of downloaded files
      run: ls -R artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/**/*.dmg
          artifacts/**/*.exe
          artifacts/**/*.tar.gz
        draft: true
        prerelease: ${{ needs.resolve-version.outputs.is_prerelease == 'true' }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
