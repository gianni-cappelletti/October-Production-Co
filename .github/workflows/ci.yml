name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  # VCV Rack SDK configuration
  # To update SDK version, modify scripts/vcv-sdk-config.sh
  # This file is sourced to ensure version consistency across CI and local builds
  VCV_SDK_VERSION: "2.5.2"
  VCV_SDK_SHA256: "228e6a415b09fbd5536cdd588a01472d81d470ea2fc747cf05e5e56ef25d5c09"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check formatting
      run: |
        pip install clang-format==22.1.2
        find libs plugins -name "*.cpp" -o -name "*.hpp" -o -name "*.h" | \
          xargs clang-format --dry-run --Werror --style=file

    - name: Check license compliance
      run: |
        echo "Checking for required license documentation..."
        missing=0

        for f in LICENSE docs/legal/LICENSING.md docs/legal/TRADEMARK.md docs/legal/THIRD_PARTY_NOTICES.txt REUSE.toml; do
          if [ ! -f "$f" ]; then
            echo "Error: $f not found"
            missing=1
          else
            echo "  $f found"
          fi
        done

        if [ ! -d "LICENSES" ]; then
          echo "Error: LICENSES/ directory not found"
          missing=1
        else
          echo "  LICENSES/ directory found"
        fi

        if [ "$missing" -eq 1 ]; then
          exit 1
        fi
        echo "All required license files present"

    - name: REUSE compliance check
      run: |
        pip install reuse
        reuse lint

  setup-vcv-sdk:
    name: Setup VCV Rack SDK
    runs-on: ubuntu-latest

    steps:
    - name: Download and verify VCV Rack SDK
      run: |
        wget -q https://vcvrack.com/downloads/Rack-SDK-${VCV_SDK_VERSION}-lin-x64.zip
        echo "${VCV_SDK_SHA256}  Rack-SDK-${VCV_SDK_VERSION}-lin-x64.zip" | sha256sum -c -
        unzip -q Rack-SDK-*.zip
        mv Rack-SDK Rack

    - name: Upload SDK artifact
      uses: actions/upload-artifact@v4
      with:
        name: vcv-rack-sdk
        path: Rack/
        retention-days: 1

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    needs: [setup-vcv-sdk]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Download VCV Rack SDK
      uses: actions/download-artifact@v4
      with:
        name: vcv-rack-sdk
        path: ../Rack

    - name: Install clang-tidy
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-tidy

    - name: Run clang-tidy
      run: |
        find libs/octobir-core/src plugins/octobir/vcv-rack/src -name "*.cpp" | \
          xargs -I {} clang-tidy {} \
            -- \
            -I./libs/octobir-core/include \
            -I./third_party/WDL/WDL \
            -I./third_party \
            -I./third_party/pffft/include/pffft \
            -I../Rack/include \
            -I../Rack/dep/include \
            -std=c++11

  test-octobir-core:
    name: Run OctobIR Core Tests
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake ninja-build

    - name: Configure CMake
      run: cmake --preset test-octobir-core -G Ninja

    - name: Build core tests
      run: cmake --build build/test-octobir-core --target octobir-core-tests -j

    - name: Run core tests
      run: ASAN_OPTIONS=detect_leaks=1 ./build/test-octobir-core/libs/octobir-core/tests/octobir-core-tests

  test-octobir-vcv:
    name: Run OctobIR VCV Tests
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake ninja-build

    - name: Configure CMake
      run: cmake --preset test-octobir-vcv -G Ninja

    - name: Build VCV tests
      run: cmake --build build/test-octobir-vcv --target octobir-vcv-tests -j

    - name: Run VCV tests
      run: ASAN_OPTIONS=detect_leaks=1 ./build/test-octobir-vcv/plugins/octobir/vcv-rack/tests/octobir-vcv-tests

  test-octobir-juce:
    name: Run OctobIR JUCE Tests
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          libasound2-dev \
          libjack-jackd2-dev \
          libcurl4-openssl-dev \
          libfreetype6-dev \
          libx11-dev \
          libxcomposite-dev \
          libxcursor-dev \
          libxext-dev \
          libxinerama-dev \
          libxrandr-dev \
          libxrender-dev \
          libwebkit2gtk-4.1-dev \
          libglu1-mesa-dev \
          mesa-common-dev

    - name: Configure CMake
      run: cmake --preset test-octobir-juce -G Ninja

    - name: Build JUCE tests
      run: cmake --build build/test-octobir-juce --target octobir-plugin-tests -j

    - name: Run JUCE tests
      run: ASAN_OPTIONS=detect_leaks=1 ./build/test-octobir-juce/plugins/octobir/juce/tests/octobir-plugin-tests

  test-octobass-juce:
    name: Run OctoBASS JUCE Tests
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          libasound2-dev \
          libjack-jackd2-dev \
          libcurl4-openssl-dev \
          libfreetype6-dev \
          libx11-dev \
          libxcomposite-dev \
          libxcursor-dev \
          libxext-dev \
          libxinerama-dev \
          libxrandr-dev \
          libxrender-dev \
          libwebkit2gtk-4.1-dev \
          libglu1-mesa-dev \
          mesa-common-dev

    - name: Configure CMake
      run: cmake --preset test-octobass-juce -G Ninja

    - name: Build OctoBASS JUCE tests
      run: cmake --build build/test-octobass-juce --target octobass-plugin-tests -j

    - name: Run OctoBASS JUCE tests
      run: ASAN_OPTIONS=detect_leaks=1 ./build/test-octobass-juce/plugins/octobass/juce/tests/octobass-plugin-tests

  build-vcv:
    name: Build VCV Plugin
    runs-on: ubuntu-latest
    needs: [lint, setup-vcv-sdk]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Download VCV Rack SDK
      uses: actions/download-artifact@v4
      with:
        name: vcv-rack-sdk
        path: ../Rack

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libglu1-mesa-dev libx11-dev libxext-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev zlib1g-dev

    - name: Build plugin
      run: |
        cd plugins/octobir/vcv-rack
        export RACK_DIR=../../../../Rack
        make dep
        make

  build-octobir-juce:
    name: Build OctobIR JUCE Plugin
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          libasound2-dev \
          libjack-jackd2-dev \
          libcurl4-openssl-dev \
          libfreetype6-dev \
          libx11-dev \
          libxcomposite-dev \
          libxcursor-dev \
          libxext-dev \
          libxinerama-dev \
          libxrandr-dev \
          libxrender-dev \
          libwebkit2gtk-4.1-dev \
          libglu1-mesa-dev \
          mesa-common-dev

    - name: Build OctobIR JUCE Plugin
      run: |
        cmake --preset dev-octobir -G Ninja
        cmake --build build/dev-octobir --target OctobIR_All -j

  build-octobass-juce:
    name: Build OctoBASS JUCE Plugin
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          libasound2-dev \
          libjack-jackd2-dev \
          libcurl4-openssl-dev \
          libfreetype6-dev \
          libx11-dev \
          libxcomposite-dev \
          libxcursor-dev \
          libxext-dev \
          libxinerama-dev \
          libxrandr-dev \
          libxrender-dev \
          libwebkit2gtk-4.1-dev \
          libglu1-mesa-dev \
          mesa-common-dev

    - name: Build OctoBASS JUCE Plugin
      run: |
        cmake --preset dev-octobass -G Ninja
        cmake --build build/dev-octobass --target OctoBASS_All -j
